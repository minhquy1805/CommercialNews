name: Backend - Deploy to VM

on:
  workflow_dispatch:
    inputs:
      backend_version:
        description: "Backend version to deploy, example: v1.0.2"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy API and Worker
    runs-on: ubuntu-latest

    steps:
      - name: Validate version
        shell: bash
        run: |
          VERSION="${{ inputs.backend_version }}"

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            echo "Expected format: vX.Y.Z, example: v1.0.2"
            exit 1
          fi

          echo "Version is valid: $VERSION"

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/commercialnews_vm_key
          chmod 600 ~/.ssh/commercialnews_vm_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend
        shell: bash
        run: |
          BACKEND_VERSION="${{ inputs.backend_version }}"

          ssh -i ~/.ssh/commercialnews_vm_key "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" << EOF
            set -e

            cd "${{ secrets.VM_DEPLOY_PATH }}"

            echo "Pull latest deploy config"
            git fetch origin
            git reset --hard origin/main

            echo "Set backend version: $BACKEND_VERSION"
            if grep -q '^BACKEND_IMAGE_VERSION=' .env.prod; then
              sed -i "s/^BACKEND_IMAGE_VERSION=.*/BACKEND_IMAGE_VERSION=$BACKEND_VERSION/" .env.prod
            else
              echo "BACKEND_IMAGE_VERSION=$BACKEND_VERSION" >> .env.prod
            fi

            echo "Validate docker compose"
            docker compose --env-file .env.prod -f docker-compose.prod.yaml config > /tmp/commercialnews-compose-check.yaml

            echo "Pull backend images"
            docker compose --env-file .env.prod -f docker-compose.prod.yaml pull commercialnews-api commercialnews-worker

            echo "Start backend services"
            docker compose --env-file .env.prod -f docker-compose.prod.yaml up -d commercialnews-api commercialnews-worker

            echo "Check backend health inside Docker network"
            sleep 5
            docker exec commercialnews-nginx \
              wget --header="Host: api.minhquy.dev" \
              -q -O- http://commercialnews-api:8080/health/ready

            echo "Backend deployment completed"
          EOF