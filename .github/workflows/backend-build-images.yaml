name: Backend - Build Versioned Docker Images

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      version:
        description: "Backend version tag, example: v1.0.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: minhquy1805/commercialnews-api
  WORKER_IMAGE_NAME: minhquy1805/commercialnews-worker
  SOURCE_REPOSITORY_URL: https://github.com/minhquy1805/CommercialNews
  IMAGE_AUTHOR: Nguyen Minh Quy

jobs:
  build-backend-images:
    name: Build Backend Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Resolve backend version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            echo "Version must match format vX.Y.Z, example: v1.0.0"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

          echo "Resolved backend version: $VERSION"
          echo "Resolved short sha: $SHORT_SHA"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:sha-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=CommercialNews API
            org.opencontainers.image.description=CommercialNews backend API
            org.opencontainers.image.source=${{ env.SOURCE_REPOSITORY_URL }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.authors=${{ env.IMAGE_AUTHOR }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:sha-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=CommercialNews Worker
            org.opencontainers.image.description=CommercialNews backend worker
            org.opencontainers.image.source=${{ env.SOURCE_REPOSITORY_URL }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.authors=${{ env.IMAGE_AUTHOR }}