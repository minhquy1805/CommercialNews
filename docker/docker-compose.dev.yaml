      RabbitMq__ReadingConsumer__Password: "${RABBITMQ_PASSWORD}"
      RabbitMq__ReadingConsumer__VirtualHost: "${RABBITMQ_VIRTUAL_HOST}"
      RabbitMq__ReadingConsumer__ExchangeName: "${RABBITMQ_EXCHANGE_NAME}"
