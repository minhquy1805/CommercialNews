      RabbitMq__InteractionConsumer__UserName: "${RABBITMQ_USERNAME}"
      RabbitMq__InteractionConsumer__Password: "${RABBITMQ_PASSWORD}"
      RabbitMq__InteractionConsumer__VirtualHost: "${RABBITMQ_VIRTUAL_HOST}"
      RabbitMq__InteractionConsumer__ExchangeName: "${RABBITMQ_EXCHANGE_NAME}"
      RabbitMq__InteractionConsumer__ExchangeType: "${RABBITMQ_EXCHANGE_TYPE}"
      RabbitMq__InteractionConsumer__QueueName: "${RABBITMQ_INTERACTION_QUEUE_NAME}"
      RabbitMq__InteractionConsumer__DurableQueue: "${RABBITMQ_INTERACTION_DURABLE_QUEUE}"
      RabbitMq__InteractionConsumer__ExclusiveQueue: "${RABBITMQ_INTERACTION_EXCLUSIVE_QUEUE}"
      RabbitMq__InteractionConsumer__AutoDeleteQueue: "${RABBITMQ_INTERACTION_AUTO_DELETE_QUEUE}"
      RabbitMq__InteractionConsumer__PrefetchCount: "${RABBITMQ_INTERACTION_PREFETCH_COUNT}"
      RabbitMq__InteractionConsumer__ConsumerTag: "${RABBITMQ_INTERACTION_CONSUMER_TAG}"
      RabbitMq__InteractionConsumer__ClientProvidedName: "${RABBITMQ_INTERACTION_CLIENT_PROVIDED_NAME}"
      RabbitMq__InteractionConsumer__RequeueOnFailure: "${RABBITMQ_INTERACTION_REQUEUE_ON_FAILURE}"

      RabbitMq__InteractionConsumer__RoutingKeys__0: "content.article_published"
      RabbitMq__InteractionConsumer__RoutingKeys__1: "content.article_unpublished"
      RabbitMq__InteractionConsumer__RoutingKeys__2: "content.article_archived"
      RabbitMq__InteractionConsumer__RoutingKeys__3: "content.article_soft_deleted"

      RabbitMq__InteractionStatsConsumer__HostName: "${RABBITMQ_HOST}"
      RabbitMq__InteractionStatsConsumer__Port: "${RABBITMQ_PORT}"
      RabbitMq__InteractionStatsConsumer__UserName: "${RABBITMQ_USERNAME}"
      RabbitMq__InteractionStatsConsumer__Password: "${RABBITMQ_PASSWORD}"
      RabbitMq__InteractionStatsConsumer__VirtualHost: "${RABBITMQ_VIRTUAL_HOST}"
      RabbitMq__InteractionStatsConsumer__ExchangeName: "${RABBITMQ_EXCHANGE_NAME}"
      RabbitMq__InteractionStatsConsumer__ExchangeType: "${RABBITMQ_EXCHANGE_TYPE}"
      RabbitMq__InteractionStatsConsumer__QueueName: "${RABBITMQ_INTERACTION_STATS_QUEUE_NAME}"
      RabbitMq__InteractionStatsConsumer__DurableQueue: "${RABBITMQ_INTERACTION_STATS_DURABLE_QUEUE}"
      RabbitMq__InteractionStatsConsumer__ExclusiveQueue: "${RABBITMQ_INTERACTION_STATS_EXCLUSIVE_QUEUE}"
      RabbitMq__InteractionStatsConsumer__AutoDeleteQueue: "${RABBITMQ_INTERACTION_STATS_AUTO_DELETE_QUEUE}"
      RabbitMq__InteractionStatsConsumer__PrefetchCount: "${RABBITMQ_INTERACTION_STATS_PREFETCH_COUNT}"
      RabbitMq__InteractionStatsConsumer__ConsumerTag: "${RABBITMQ_INTERACTION_STATS_CONSUMER_TAG}"
      RabbitMq__InteractionStatsConsumer__ClientProvidedName: "${RABBITMQ_INTERACTION_STATS_CLIENT_PROVIDED_NAME}"
      RabbitMq__InteractionStatsConsumer__RequeueOnFailure: "${RABBITMQ_INTERACTION_STATS_REQUEUE_ON_FAILURE}"

      RabbitMq__InteractionStatsConsumer__RoutingKeys__0: "interaction.article_liked"
      RabbitMq__InteractionStatsConsumer__RoutingKeys__1: "interaction.article_unliked"
      RabbitMq__InteractionStatsConsumer__RoutingKeys__2: "interaction.comment_created"
      RabbitMq__InteractionStatsConsumer__RoutingKeys__3: "interaction.comment_hidden"
      RabbitMq__InteractionStatsConsumer__RoutingKeys__4: "interaction.comment_restored"
      RabbitMq__InteractionStatsConsumer__RoutingKeys__5: "interaction.comment_deleted_by_author"
    depends_on:
      - cn-mssql
      - rabbitmq
    restart: unless-stopped

  cn-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cn-mssql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "${SA_PASSWORD}"
    volumes:
      - cn_mssql_data:/var/opt/mssql
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: cn-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    volumes:
      - cn_rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  cn_mssql_data:
  cn_rabbitmq_data:
  cn_api_uploads:
