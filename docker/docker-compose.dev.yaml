      RabbitMq__AuditConsumer__RoutingKeys__7: "authorization.role_deactivated"
      RabbitMq__AuditConsumer__RoutingKeys__8: "authorization.permission_created"
      RabbitMq__AuditConsumer__RoutingKeys__9: "authorization.permission_updated"
      RabbitMq__AuditConsumer__RoutingKeys__10: "authorization.permission_activated"
      RabbitMq__AuditConsumer__RoutingKeys__11: "authorization.permission_deactivated"
      RabbitMq__AuditConsumer__RoutingKeys__12: "identity.email_verified"
      RabbitMq__AuditConsumer__RoutingKeys__13: "identity.password_changed"
      RabbitMq__AuditConsumer__RoutingKeys__14: "identity.user_activated"
      RabbitMq__AuditConsumer__RoutingKeys__15: "identity.user_disabled"
      RabbitMq__AuditConsumer__RoutingKeys__16: "identity.user_locked"
      RabbitMq__AuditConsumer__RoutingKeys__17: "identity.user_unlocked"
      RabbitMq__AuditConsumer__RoutingKeys__18: "identity.email_marked_verified"
      RabbitMq__AuditConsumer__RoutingKeys__19: "identity.user_sessions_revoked"
      RabbitMq__AuditConsumer__RoutingKeys__20: "content.article_created"
      RabbitMq__AuditConsumer__RoutingKeys__21: "content.article_updated"
      RabbitMq__AuditConsumer__RoutingKeys__22: "content.article_published"
      RabbitMq__AuditConsumer__RoutingKeys__23: "content.article_unpublished"
      RabbitMq__AuditConsumer__RoutingKeys__24: "content.article_archived"
      RabbitMq__AuditConsumer__RoutingKeys__25: "content.article_soft_deleted"
      RabbitMq__AuditConsumer__RoutingKeys__26: "media.asset_registered"
      RabbitMq__AuditConsumer__RoutingKeys__27: "media.asset_updated"
      RabbitMq__AuditConsumer__RoutingKeys__28: "media.asset_soft_deleted"
      RabbitMq__AuditConsumer__RoutingKeys__29: "media.asset_restored"
      RabbitMq__AuditConsumer__RoutingKeys__30: "media.article_media_attached"
      RabbitMq__AuditConsumer__RoutingKeys__31: "media.article_media_detached"
      RabbitMq__AuditConsumer__RoutingKeys__32: "media.article_media_reordered"
      RabbitMq__AuditConsumer__RoutingKeys__33: "media.article_primary_media_set"
      RabbitMq__AuditConsumer__RoutingKeys__34: "interaction.comment_hidden"
      RabbitMq__AuditConsumer__RoutingKeys__35: "interaction.comment_restored"
      RabbitMq__AuditConsumer__RoutingKeys__36: "interaction.comment_deleted_by_author"
      RabbitMq__AuditConsumer__RoutingKeys__37: "interaction.comment_reports_dismissed"

      RabbitMq__SeoConsumer__HostName: "${RABBITMQ_HOST}"
      RabbitMq__SeoConsumer__Port: "${RABBITMQ_PORT}"
      RabbitMq__SeoConsumer__UserName: "${RABBITMQ_USERNAME}"
      RabbitMq__SeoConsumer__Password: "${RABBITMQ_PASSWORD}"
      RabbitMq__SeoConsumer__VirtualHost: "${RABBITMQ_VIRTUAL_HOST}"
      RabbitMq__SeoConsumer__ExchangeName: "${RABBITMQ_EXCHANGE_NAME}"
      RabbitMq__SeoConsumer__ExchangeType: "${RABBITMQ_EXCHANGE_TYPE}"
      RabbitMq__SeoConsumer__QueueName: "${RABBITMQ_SEO_QUEUE_NAME}"
      RabbitMq__SeoConsumer__DurableQueue: "${RABBITMQ_SEO_DURABLE_QUEUE}"
      RabbitMq__SeoConsumer__ExclusiveQueue: "${RABBITMQ_SEO_EXCLUSIVE_QUEUE}"
      RabbitMq__SeoConsumer__AutoDeleteQueue: "${RABBITMQ_SEO_AUTO_DELETE_QUEUE}"
      RabbitMq__SeoConsumer__PrefetchCount: "${RABBITMQ_SEO_PREFETCH_COUNT}"
      RabbitMq__SeoConsumer__ConsumerTag: "${RABBITMQ_SEO_CONSUMER_TAG}"
      RabbitMq__SeoConsumer__ClientProvidedName: "${RABBITMQ_SEO_CLIENT_PROVIDED_NAME}"
      RabbitMq__SeoConsumer__RequeueOnFailure: "${RABBITMQ_SEO_REQUEUE_ON_FAILURE}"

      RabbitMq__SeoConsumer__RoutingKeys__0: "content.article_created"
      RabbitMq__SeoConsumer__RoutingKeys__1: "content.article_updated"
      RabbitMq__SeoConsumer__RoutingKeys__2: "content.article_published"
      RabbitMq__SeoConsumer__RoutingKeys__3: "content.article_unpublished"
      RabbitMq__SeoConsumer__RoutingKeys__4: "content.article_archived"
      RabbitMq__SeoConsumer__RoutingKeys__5: "content.article_soft_deleted"

      RabbitMq__ReadingConsumer__HostName: "${RABBITMQ_HOST}"
      RabbitMq__ReadingConsumer__Port: "${RABBITMQ_PORT}"
